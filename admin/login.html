<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login | Digital Marketer Portfolio</title>
    <meta
      content="Secure admin login page for managing the digital marketer portfolio content."
      name="description"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <link href="../assets/css/admin.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="admin-login-body">
    <section class="admin-login-section">
      <div class="admin-login-card">
        <div class="login-brand">
          <div class="login-logo">DM</div>
          <div>
            <h1>Admin Panel</h1>
            <p>Digital Marketer Portfolio</p>
          </div>
        </div>
        <div class="login-heading">
          <span>Welcome Back</span>
          <h2>Login to Dashboard</h2>
          <p>Manage profile, services, projects, reviews, and messages.</p>
        </div>
        <form class="admin-login-form" id="adminLoginForm">
          <div class="admin-form-group">
            <label for="adminEmail">Email Address</label>
            <input
              id="adminEmail"
              placeholder="admin@example.com"
              required=""
              type="email"
            />
          </div>
          <div class="admin-form-group">
            <label for="adminPassword">Password</label>
            <input
              id="adminPassword"
              placeholder="Enter password"
              required=""
              type="password"
            />
          </div>
          <button class="admin-btn admin-btn-primary" type="submit">
            Login Now
          </button>
        </form>
      </div>
    </section>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/initial-data.js"></script>
    <script src="../assets/js/image-url-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin.js?v=1.0.3"></script>
  </body>
</html>
